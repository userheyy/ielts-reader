<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>雅思听力精听</title>
  <link rel="stylesheet" href="css/style.css?v=10" />
  <link rel="stylesheet" href="css/listening.css?v=2" />
</head>
<body>
  <header class="topbar">
    <h1>雅思备考</h1>
    <a href="index.html">阅读</a>
    <a href="listening.html" class="active">听力</a>
    <a href="writing.html">写作</a>
    <a href="speaking.html">口语</a>
    <a href="vocab.html">生词</a>
    <a href="grammar.html">语法</a>
    <a href="settings.html">设置</a>
  </header>
  <div class="container">
    <div id="notice"></div>

    <!-- 落地页:测试卡列表(无 ?id 时显示) -->
    <div id="landing" hidden>
      <div class="lsn-head">
        <h2>雅思听力精听</h2>
        <p>逐句遮罩精听(先听后看)→ 4 级渐进提示 → 听写判分 → 真题演练。选一个 Part 开始。</p>
      </div>
      <div id="landing-list"></div>
    </div>

    <!-- 精听页(?id=xxx 时显示):顶部 sticky 播放器 + 2 栏(转写 + 题目/听写) -->
    <div id="player-view" hidden>
      <div class="listen-toolbar">
        <span class="src" id="lsn-src"></span>
        <a class="lsn-annotate-link" id="annotate-link" href="#" hidden>退出打点</a>
      </div>
      <div class="pl-sticky" id="lsn-player-bar"></div>
      <div class="listen-grid">
        <div class="pane lsn-left" id="transcript"></div>
        <div class="lsn-right">
          <aside class="pane questions" id="lsn-questions"></aside>
          <div class="lsn-side" id="lsn-side"></div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="js/listening.js?v=1"></script>
</body>
</html>
