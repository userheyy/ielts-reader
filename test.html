<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>单词测试</title>
  <link rel="stylesheet" href="css/style.css?v=14" />
  <script>if(new URLSearchParams(location.search).get("embed")==="1")document.documentElement.classList.add("embed");</script>
</head>
<body>
  <header class="topbar">
    <h1>雅思备考</h1>
    <a href="index.html">阅读</a>
    <a href="listening.html">听力</a>
    <a href="writing.html">写作</a>
    <a href="speaking.html">口语</a>
    <a href="vocab.html">生词</a>
    <a href="grammar.html">语法</a>
    <a href="settings.html">设置</a>
  </header>
  <div class="container quiz-container">

    <!-- 首页 / 开始 -->
    <section id="setup" class="quiz-setup">
      <span class="eyebrow">CLOZE TEST</span>
      <h2>单词测试</h2>
      <p class="quiz-intro">看句子选词，选完看翻译和辨析。答错的词进错题本，可以只刷错题，连续答对两次才移出。</p>
      <div class="quiz-stat" id="stat-summary"></div>
      <div class="quiz-start-btns">
        <button id="start-normal" class="quiz-primary">开始测试（10 题）</button>
        <button id="start-wrong" class="quiz-secondary">重做错题（0）</button>
      </div>
      <!-- 朗读控件统一在 settings.html 配置 -->
      <p class="quiz-notice" id="notice" hidden></p>
    </section>

    <!-- 答题 -->
    <section id="quiz" class="quiz-play" hidden>
      <div class="quiz-topline">
        <span id="q-progress">第 1 / 10 题</span>
        <span id="q-score">✅ 0　❌ 0</span>
      </div>
      <div class="quiz-bar"><div class="quiz-bar-fill" id="q-bar"></div></div>
      <div class="quiz-stem" id="q-stem"></div>
      <div class="quiz-options" id="q-options"></div>
      <div class="quiz-explain" id="q-explain" hidden></div>
      <button class="quiz-next" id="q-next" hidden>下一题 →</button>
    </section>

    <!-- 结果 -->
    <section id="result" class="quiz-result" hidden>
      <div class="quiz-score-big" id="r-score"></div>
      <div class="quiz-pct" id="r-pct"></div>
      <h3 class="quiz-missed-title">本轮错题</h3>
      <ul class="quiz-missed" id="r-missed"></ul>
      <div class="quiz-result-btns">
        <button id="r-again" class="quiz-primary">再来一组</button>
        <button id="r-again-wrong" class="quiz-secondary">重做错题（0）</button>
        <button id="r-back" class="quiz-ghost">返回</button>
      </div>
    </section>

  </div>
  <script type="module" src="js/test.js?v=2"></script>
</body>
</html>
