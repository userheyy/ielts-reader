<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>每日单词</title>
  <link rel="stylesheet" href="css/style.css?v=4" />
</head>
<body>
  <header class="topbar">
    <h1>雅思阅读精读器</h1>
    <a href="index.html">文章库</a>
    <a href="daily.html">每日</a>
    <a href="vocab.html">生词库</a>
    <a href="library.html">词库</a>
  </header>
  <div class="container">

    <!-- 日历热力图:记忆痕迹 -->
    <section class="cal-card">
      <div class="cal-top">
        <h3>📅 记忆痕迹</h3>
        <div class="cal-streak">连续打卡 <b id="streak-days">0</b> 天 · 累计 <b id="total-words">0</b> 词</div>
      </div>
      <div class="heat" id="heatmap"></div>
      <div class="cal-legend">少
        <span class="cell"></span><span class="cell l1"></span><span class="cell l2"></span><span class="cell l3"></span><span class="cell l4"></span>
        多　·　<span class="cell today-legend"></span> 今天</div>
    </section>

    <!-- 今日任务 -->
    <section class="today-card" id="today-card">
      <div class="today-head">
        <h3>今日任务</h3>
        <span class="today-date" id="today-date"></span>
      </div>
      <p class="today-sub" id="today-sub">系统按记忆曲线为你安排：先复习到期旧词，再学新词。</p>
      <div class="split">
        <div class="stat-box"><div class="n" id="review-count">0</div><div class="lbl">🔁 待复习</div></div>
        <div class="stat-box new"><div class="n" id="new-count">0</div><div class="lbl">✨ 新学</div></div>
      </div>
      <div class="prog-wrap">
        <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
        <div class="prog-txt" id="prog-txt">今日已完成 0 / 0 词</div>
      </div>
      <div class="today-buttons">
        <button class="start-btn" id="start-btn">开始今日任务 →</button>
        <button class="pace-btn" id="pace-btn">⚙️ 节奏设置</button>
      </div>
      <div class="mini-note" id="mini-note">全部清完，今天的格子就会点亮；到期复习词会自动回到任务里。</div>
    </section>

    <!-- 过词卡(学习进行时) -->
    <section class="study-wrap" id="study-wrap" hidden>
      <div class="study-top" id="study-top"></div>
      <div class="review-card" id="study-card">
        <div class="review-progress" id="study-progress"></div>
        <div class="review-word-line">
          <div class="review-word" id="study-word"></div>
          <button class="speak-review-word" id="study-speak" title="朗读当前单词">🔊</button>
        </div>
        <div class="review-pos" id="study-pos"></div>
        <div class="review-hint" id="study-hint" hidden>
          <div id="study-hint-morph"></div>
          <span class="hint-tip">先看词根，试着推出词义，再翻答案 —— 主动回忆更牢</span>
        </div>
        <div class="review-answer" id="study-answer" hidden>
          <strong id="study-def"></strong>
          <p id="study-example"></p>
          <div id="study-aids"></div>
        </div>
        <button class="reveal" id="study-reveal">显示释义 + 记忆法</button>
        <div class="review-actions" id="study-actions" hidden>
          <button data-rating="forgot">忘记了 <small>很快再来</small></button>
          <button data-rating="fuzzy">有点模糊 <small>明天复习</small></button>
          <button data-rating="remembered">记住了 <small>拉长间隔</small></button>
        </div>
      </div>
      <div class="study-controls">
        <button class="study-quit" id="study-quit">暂停，回到今日概览</button>
        <div class="speech-controls vocab-speech-controls" aria-label="单词朗读设置" style="margin-left:auto">
          <span>发音</span>
          <select id="speech-voice" aria-label="英语发音人"><option>加载语音…</option></select>
          <select id="speech-rate" aria-label="朗读速度">
            <option value="0.7">慢速 0.7×</option>
            <option value="0.9" selected>清晰 0.9×</option>
            <option value="1">正常 1×</option>
          </select>
          <button id="speech-stop" class="speech-stop" title="停止朗读">■</button>
        </div>
      </div>
    </section>

    <!-- 全部完成 -->
    <section class="done-card" id="done-card" hidden>
      <div class="done-emoji">🎉</div>
      <h3>今日任务完成！</h3>
      <p id="done-msg">今天的格子已点亮。明天见。</p>
      <button class="start-btn" id="done-back">回到概览</button>
    </section>
  </div>

  <!-- 节奏设置弹层 -->
  <div class="pace-modal" id="pace-modal" hidden>
    <div class="pace-panel">
      <h3>每日节奏</h3>
      <p class="pace-hint">复习词到期尽量全过（不欠债），你调的是每天学多少新词。</p>
      <div class="pace-list" id="pace-list">
        <button class="pace-opt" data-new="20">🐢 轻松 · <b>20</b> 新词/天</button>
        <button class="pace-opt" data-new="30">🚶 标准 · <b>30</b> 新词/天</button>
        <button class="pace-opt" data-new="40">🔥 强化 · <b>40</b> 新词/天</button>
      </div>
      <div class="pace-custom">
        <label>自定义每天新词：<input type="number" id="pace-custom-new" min="0" max="200" /></label>
      </div>
      <div class="pace-actions">
        <button class="pace-cancel" id="pace-cancel">取消</button>
        <button class="pace-save" id="pace-save">保存</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/daily.js?v=2"></script>
</body>
</html>
