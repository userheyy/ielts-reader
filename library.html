<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>雅思核心词库</title>
  <link rel="stylesheet" href="css/style.css?v=14" />
  <script>if(new URLSearchParams(location.search).get("embed")==="1")document.documentElement.classList.add("embed");</script>
</head>
<body>
  <header class="topbar">
    <h1>雅思备考</h1>
    <a href="index.html">阅读</a>
    <a href="listening.html">听力</a>
    <a href="writing.html">写作</a>
    <a href="speaking.html">口语</a>
    <a href="vocab.html">生词</a>
    <a href="grammar.html">语法</a>
    <a href="settings.html">设置</a>
  </header>
  <div class="container">
    <div class="lib-head">
      <h2>雅思核心词库</h2>
      <div class="lib-progress" id="lib-progress">加载中…</div>
    </div>
    <p style="color:var(--muted);font-size:13px;margin:-4px 0 14px">
      用词根词缀、词族串联、联想助记来记雅思词。点「加入复习」把词纳入生词库的复习抽词，和你的生词一起按记忆曲线滚动。
    </p>
    <div class="lib-tabs">
      <button class="lib-tab active" data-view="root">按词根成组</button>
      <button class="lib-tab" data-view="list">按词频列表</button>
    </div>
    <input type="text" class="lib-search" id="lib-search" placeholder="搜索单词或释义…" />
    <!-- 朗读控件统一在 settings.html 配置 -->
    <div class="lib-cefr-filter" id="lib-cefr-filter" aria-label="按 CEFR 难度筛选"></div>
    <div class="lib-pager" id="lib-pager-top"></div>
    <div id="lib-body"></div>
    <div class="lib-pager bottom" id="lib-pager-bottom"></div>
    <p class="lib-empty" id="lib-empty" hidden>词库还没有数据。第一批词生成后会出现在这里。</p>
  </div>
  <script type="module" src="js/library.js?v=9"></script>
</body>
</html>
