<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>雅思核心词库</title>
  <link rel="stylesheet" href="css/style.css?v=5" />
</head>
<body>
  <header class="topbar">
    <h1>雅思阅读精读器</h1>
    <a href="index.html">文章库</a>
    <a href="listening.html">听力</a>
    <a href="daily.html">每日</a>
    <a href="vocab.html">生词库</a>
    <a href="library.html">词库</a>
    <a href="test.html">测试</a>
    <a href="grammar.html">语法书</a>
    <a href="settings.html">设置</a>
  </header>
  <div class="container">
    <div class="lib-head">
      <h2>雅思核心词库</h2>
      <div class="lib-progress" id="lib-progress">加载中…</div>
    </div>
    <p style="color:var(--muted);font-size:13px;margin:-4px 0 14px">
      用词根词缀、词族串联、联想助记来记雅思词。点「加入复习」把词纳入生词库的复习抽词，和你的生词一起按记忆曲线滚动。
    </p>
    <div class="lib-tabs">
      <button class="lib-tab active" data-view="root">按词根成组</button>
      <button class="lib-tab" data-view="list">按词频列表</button>
    </div>
    <input type="text" class="lib-search" id="lib-search" placeholder="搜索单词或释义…" />
    <div class="speech-controls" style="margin:0 0 14px;display:inline-flex" aria-label="单词朗读设置">
      <span>发音</span>
      <select id="speech-voice" aria-label="英语发音人"><option>加载语音…</option></select>
      <select id="speech-rate" aria-label="朗读速度">
        <option value="0.7">慢速 0.7×</option>
        <option value="0.9">清晰 0.9×</option>
        <option value="1" selected>正常 1×</option>
      </select>
      <button id="speech-stop" class="speech-stop" title="停止朗读">■</button>
    </div>
    <div id="lib-body"></div>
    <p class="lib-empty" id="lib-empty" hidden>词库还没有数据。第一批词生成后会出现在这里。</p>
  </div>
  <script type="module" src="js/library.js?v=3"></script>
</body>
</html>
